apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprite
  namespace: sprite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sprite
  template:
    metadata:
      labels:
        app: sprite
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      containers:
        - name: sprite
          image: zot.maix.ovh/sprite:v0.0.2
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
          env:
            - name: SPRITE_FLOW_GRPC_ENDPOINT
              value: "http://flow-service.flow.svc.cluster.local:9090"
            - name: SPRITE_AMQP_URI
              valueFrom:
                secretKeyRef:
                  name: sprite-secret
                  key: SPRITE_AMQP_URI
            - name: SPRITE_BEHAVIOR_QUEUE
              value: "sprite.behavior.in"
            - name: SPRITE_CONVERSATION_QUEUE
              value: "sprite.conversation.in"
            - name: SPRITE_BEHAVIOR_BIND_EXCHANGE
              value: "flow.events"
            - name: SPRITE_BEHAVIOR_BIND_ROUTING_KEY
              value: "behavior.dispatch"
            - name: SPRITE_RMQ_DECLARE
              value: "true"
            - name: SPRITE_RMQ_PREFETCH
              value: "64"
            - name: SPRITE_REDIS_URL
              value: "redis://redis-service.redis.svc.cluster.local:6379/2"
            - name: SPRITE_CONVERSATION_GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5

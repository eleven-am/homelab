apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-deployment
  namespace: radarr
  labels:
    app: radarr-deployment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
  selector:
    matchLabels:
      app: radarr-deployment
  template:
    metadata:
      name: radarr-deployment
      labels:
        app: radarr-deployment
    spec:
      restartPolicy: Always
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest@sha256:2b2c1c05eb3f648d2c80dfab9486147dd7bb0ad4d77fa972fc1c5de8f1da3738
          imagePullPolicy: Always
          ports:
            - containerPort: 7878
              name: radarr
              protocol: TCP
          env:
            - name: PUID
              value: "1005"
            - name: PGID
              value: "1005"
            - name: TZ
              value: "Europe/Paris"
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: radarr-media
              mountPath: /media
      volumes:
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-data
        - name: radarr-media
          persistentVolumeClaim:
            claimName: radarr-media

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferret
  namespace: ferret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ferret
  template:
    metadata:
      labels:
        app: ferret
    spec:
      containers:
        - name: ferret
          image: zot.maix.ovh/ferret:v0.3.16@sha256:de9a8c3e5b92087a0da4ff7812fcba02762aadaa90c6bb74d2399ba8f7b7e7a5
          imagePullPolicy: Always
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: SQLITE_PATH
              value: "/data/ferret.db"
            - name: BETTER_AUTH_URL
              value: "https://ferret.maix.ovh"
            - name: BETTER_AUTH_TRUSTED_ORIGINS
              value: "https://ferret.maix.ovh"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: BETTER_AUTH_SECRET
            - name: OPENAI_COMPATIBLE_BASE_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000/v1"
            - name: OPENAI_COMPATIBLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: OPENAI_COMPATIBLE_API_KEY
            - name: AGENT_MODEL
              value: "openai-compatible:osiris/agentic-5.4"
            - name: GENERATOR_MODEL
              value: "openai-compatible:osiris/foundation-2048"
            - name: EXTRACT_MODEL
              value: "openai-compatible:osiris/foundation-2048"
            - name: STT_MODEL
              value: "osiris/speech-stt"
            - name: SEARCH_BACKENDS
              value: "litellm,searxng,duckduckgo"
            - name: SEARCH_EXTRACT_CONCURRENCY
              value: "1"
            - name: LITELLM_SEARCH_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000/coding/search"
            - name: SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: RERANKER_BASE_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000"
            - name: RERANKER_MODEL
              value: "osiris/reranker-568"
            - name: MIMIR_URL
              value: "http://mimir-service.mimir.svc.cluster.local:3000"
            - name: MIMIR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: MIMIR_API_KEY
            - name: MIMIR_CLIENT
              value: "ferret"
            - name: AUTH_RATE_LIMIT_ENABLED
              value: "true"
            - name: API_KEY_RATE_LIMIT_ENABLED
              value: "true"
            - name: QUEUE_CONCURRENCY_RESEARCH
              value: "5"
            - name: QUEUE_CONCURRENCY_FACTCHECK
              value: "5"
            - name: QUEUE_CONCURRENCY_EXTRACT
              value: "5"
            - name: EXTRACTION_CACHE_TTL_DAYS
              value: "30"
            - name: EXTRACTION_CACHE_MAX_PAGES
              value: "10000"
            - name: WORKFLOW_STEPS_TTL_DAYS
              value: "30"
          volumeMounts:
            - name: ferret-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: ferret-data
          persistentVolumeClaim:
            claimName: ferret-data
      imagePullSecrets:
        - name: zot-pull-secret

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferret
  namespace: ferret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ferret
  template:
    metadata:
      labels:
        app: ferret
    spec:
      containers:
        - name: ferret
          image: zot.maix.ovh/ferret:v0.3.20@sha256:3157b7447ed80d6966cad0a6e73fef353f2f5f963bfcf0e9ec5856b1d0c1951d
          imagePullPolicy: Always
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - name: http
              containerPort: 4100
          env:
            - name: FERRET_PORT
              value: "4100"
            - name: FERRET_DB_PATH
              value: "/data/ferret.db"
            - name: FERRET_BASE_URL
              value: "https://ferret.maix.ovh"
            - name: FERRET_TRUSTED_ORIGINS
              value: "https://ferret.maix.ovh"
            - name: FERRET_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: BETTER_AUTH_SECRET
            - name: FERRET_LLM_BASE_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000/v1"
            - name: FERRET_LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: OPENAI_COMPATIBLE_API_KEY
            - name: FERRET_MODEL
              value: "osiris/agentic-5.4"
            - name: FERRET_MODEL_EXTRACT
              value: "osiris/foundation-2048"
            - name: FERRET_SEARCH_URL
              value: "http://litellm-service.litellm.svc.cluster.local:4000/coding/search"
            - name: FERRET_SEARXNG_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: FERRET_EMBEDDING_MODEL
              value: "osiris/embedding-1024"
            - name: FERRET_EMBEDDING_DIM
              value: "1024"
            - name: FERRET_RERANKER_MODEL
              value: "osiris/reranker-568"
            - name: FERRET_STT_MODEL
              value: "osiris/speech-stt"
            - name: VOX_HTTP_BASE
              value: "https://vox.horus.maix.ovh"
            - name: VOX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ferret-secrets
                  key: VOX_API_KEY
            - name: VOX_STT_MODEL
              value: "parakeet-stt:tdt-0.6b-v3"
            - name: VOX_TTS_MODEL
              value: "kokoro-tts:v1.0"
            - name: VOX_VOICE
              value: "af_heart"
            - name: VOX_TURN_PROFILE
              value: "browser_default"
            - name: VOX_VAD_BACKEND
              value: "silero"
            - name: VOX_TURN_DETECTOR
              value: "livekit"
            - name: FERRET_CALL_IDLE_MS
              value: "300000"
            - name: FERRET_JOBS_CONCURRENCY
              value: "2"
            - name: FERRET_LLM_CONCURRENCY
              value: "8"
          volumeMounts:
            - name: ferret-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: ferret-data
          persistentVolumeClaim:
            claimName: ferret-data
      imagePullSecrets:
        - name: zot-pull-secret

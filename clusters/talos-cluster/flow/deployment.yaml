apiVersion: apps/v1
kind: Deployment
metadata:
  name: flow
  namespace: flow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flow
  template:
    metadata:
      labels:
        app: flow
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      initContainers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: "postgres-service.postgres.svc.cluster.local"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: FLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_USER
            - name: FLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_PASSWORD
            - name: FLOW_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_NAME
          command:
            - sh
            - -c
            - |
              echo "Checking if user $FLOW_DB_USER exists..."
              USER_EXISTS=$(psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='$FLOW_DB_USER'")
              if [ "$USER_EXISTS" != "1" ]; then
                echo "Creating user $FLOW_DB_USER..."
                psql -c "CREATE USER $FLOW_DB_USER WITH PASSWORD '$FLOW_DB_PASSWORD' CREATEDB;"
              else
                echo "User $FLOW_DB_USER already exists, updating password..."
                psql -c "ALTER USER $FLOW_DB_USER WITH PASSWORD '$FLOW_DB_PASSWORD' CREATEDB;"
              fi

              echo "Checking if database $FLOW_DB_NAME exists..."
              DB_EXISTS=$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='$FLOW_DB_NAME'")
              if [ "$DB_EXISTS" != "1" ]; then
                echo "Creating database $FLOW_DB_NAME..."
                psql -c "CREATE DATABASE $FLOW_DB_NAME OWNER $FLOW_DB_USER;"
              else
                echo "Database $FLOW_DB_NAME already exists"
              fi

              echo "Granting privileges..."
              psql -c "GRANT ALL PRIVILEGES ON DATABASE $FLOW_DB_NAME TO $FLOW_DB_USER;"
              echo "Database initialization complete!"
        - name: init-minio
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: FLOW_S3_USER
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: S3_ACCESS_KEY
            - name: FLOW_S3_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: S3_SECRET_KEY
          command:
            - sh
            - -c
            - |
              mc alias set minio http://minio-service.minio.svc.cluster.local:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

              echo "Creating bucket flow..."
              mc mb --ignore-existing minio/flow

              echo "Creating MinIO user $FLOW_S3_USER..."
              mc admin user add minio "$FLOW_S3_USER" "$FLOW_S3_PASSWORD" 2>/dev/null || echo "User already exists, updating..."
              mc admin user add minio "$FLOW_S3_USER" "$FLOW_S3_PASSWORD" 2>/dev/null || true

              echo "Creating access policy for flow bucket..."
              cat > /tmp/flow-policy.json << 'POLICY'
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:*"],
                    "Resource": ["arn:aws:s3:::flow", "arn:aws:s3:::flow/*"]
                  }
                ]
              }
              POLICY
              mc admin policy create minio flow-policy /tmp/flow-policy.json 2>/dev/null || true
              mc admin policy attach minio flow-policy --user "$FLOW_S3_USER" 2>/dev/null || true

              echo "MinIO initialization complete!"
      containers:
        - name: flow
          image: zot.maix.ovh/flow:v0.3.7
          ports:
            - name: grpc
              containerPort: 9090
          env:
            - name: ENV
              value: "production"
            - name: GRPC_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: "info"
            - name: AUTO_MIGRATE
              value: "true"
            - name: DB_HOST
              value: "postgres-service.postgres.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_SSL_MODE
              value: "disable"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: DB_NAME
            - name: POLAR_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: POLAR_ACCESS_TOKEN
            - name: REDIS_URL
              value: "redis://redis-service.redis.svc.cluster.local:6379/1"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: ENCRYPTION_KEY
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-small-default-user
                  key: connection_string
            - name: RABBITMQ_EXCHANGE
              value: "flow.events"
            - name: RABBITMQ_ROUTING_KEY
              value: "behavior.dispatch"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: INTERNAL_SECRET
            - name: SPRITE_TARGET
              value: "sprite-service.sprite.svc.cluster.local:50051"
            - name: S3_ENDPOINT
              value: "http://minio-service.minio.svc.cluster.local:9000"
            - name: S3_REGION
              value: "us-east-1"
            - name: S3_BUCKET
              value: "flow"
            - name: S3_FORCE_PATH_STYLE
              value: "true"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: flow-secret
                  key: S3_SECRET_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5

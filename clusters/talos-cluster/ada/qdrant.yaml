apiVersion: v1
kind: Service
metadata:
  name: ada-qdrant
  namespace: ada
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ada-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ada-qdrant
  namespace: ada
spec:
  serviceName: ada-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ada-qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ada-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.13.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: blizzard-storage
        resources:
          requests:
            storage: 20Gi

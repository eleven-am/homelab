apiVersion: batch/v1
kind: Job
metadata:
  name: ada-minio-buckets
  namespace: ada
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-01-17T23-25-50Z
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: ada-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ada-secret
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              until mc alias set minio http://ada-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio"
                sleep 3
              done
              mc mb --ignore-existing minio/ada-beam-payloads
              mc mb --ignore-existing minio/postgres-backups
              mc mb --ignore-existing minio/neo4j-backups
              mc mb --ignore-existing minio/qdrant-backups

apiVersion: v1
kind: Service
metadata:
  name: ada-neo4j
  namespace: ada
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ada-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ada-neo4j
  namespace: ada
spec:
  serviceName: ada-neo4j
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ada-neo4j
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ada-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5.26.19
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          env:
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ada-secret
                  key: NEO4J_PASSWORD
            - name: NEO4J_AUTH
              value: neo4j/$(NEO4J_PASSWORD)
            - name: NEO4J_PLUGINS
              value: '["apoc", "graph-data-science"]'
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: gds.*,apoc.*
            - name: NEO4J_dbms_security_procedures_allowlist
              value: gds.*,apoc.*
            - name: NEO4J_server_memory_heap_initial__size
              value: 512m
            - name: NEO4J_server_memory_heap_max__size
              value: 1g
            - name: NEO4J_server_memory_pagecache_size
              value: 512m
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - cypher-shell -u neo4j -p "$NEO4J_PASSWORD" 'RETURN gds.version()' >/dev/null
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: logs
              mountPath: /logs
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: blizzard-storage
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: logs
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: blizzard-storage
        resources:
          requests:
            storage: 5Gi

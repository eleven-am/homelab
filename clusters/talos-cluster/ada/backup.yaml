apiVersion: batch/v1
kind: CronJob
metadata:
  name: ada-postgres-backup
  namespace: ada
spec:
  schedule: "15 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:17
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -eo pipefail
                  TIMESTAMP=$(date +%Y-%m-%d-%H%M)
                  BACKUP_FILE="ada/postgres-${TIMESTAMP}.sql.gz"

                  apt-get update && apt-get install -y -qq curl >/dev/null 2>&1
                  curl -sS https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc
                  mc alias set minio http://ada-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

                  pg_dump -h ada-postgres -U postgres -d ada_oss_dev | gzip | mc pipe "minio/postgres-backups/${BACKUP_FILE}"
                  mc rm --recursive --force --older-than 14d "minio/postgres-backups/ada/" || true
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: POSTGRES_PASSWORD
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 2Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ada-neo4j-backup
  namespace: ada
spec:
  schedule: "25 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.23
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  apk add --no-cache curl gzip >/dev/null 2>&1
                  curl -sS https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc

                  TIMESTAMP=$(date +%Y-%m-%d-%H%M)
                  DUMP_FILE="/tmp/neo4j-${TIMESTAMP}.json.gz"
                  mc alias set minio http://ada-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

                  curl -sf -u "neo4j:${NEO4J_PASSWORD}" \
                    -H "Content-Type: application/json" \
                    -d '{"statements":[{"statement":"CALL db.checkpoint()"}]}' \
                    "http://ada-neo4j:7474/db/neo4j/tx/commit" >/dev/null

                  curl -sf -u "neo4j:${NEO4J_PASSWORD}" \
                    -H "Content-Type: application/json" \
                    -d '{"statements":[{"statement":"CALL apoc.export.json.all(null, {stream: true})"}]}' \
                    "http://ada-neo4j:7474/db/neo4j/tx/commit" | gzip > "$DUMP_FILE"

                  mc cp "$DUMP_FILE" "minio/neo4j-backups/ada/neo4j-${TIMESTAMP}.json.gz"
                  mc rm --recursive --force --older-than 14d "minio/neo4j-backups/ada/" || true
              env:
                - name: NEO4J_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: NEO4J_PASSWORD
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ada-qdrant-backup
  namespace: ada
spec:
  schedule: "35 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.23
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  apk add --no-cache curl gzip >/dev/null 2>&1
                  curl -sS https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc

                  TIMESTAMP=$(date +%Y-%m-%d-%H%M)
                  QDRANT_URL="http://ada-qdrant:6333"
                  mc alias set minio http://ada-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"

                  SNAPSHOT=$(curl -sf -X POST "${QDRANT_URL}/snapshots" | sed -n 's/.*"name":"\([^"]*\)".*/\1/p')

                  if [ -n "$SNAPSHOT" ]; then
                    curl -sf -o "/tmp/qdrant-${TIMESTAMP}.snapshot" "${QDRANT_URL}/snapshots/${SNAPSHOT}"
                    gzip "/tmp/qdrant-${TIMESTAMP}.snapshot"
                    mc cp "/tmp/qdrant-${TIMESTAMP}.snapshot.gz" "minio/qdrant-backups/ada/qdrant-${TIMESTAMP}.snapshot.gz"
                    curl -sf -X DELETE "${QDRANT_URL}/snapshots/${SNAPSHOT}" >/dev/null
                  fi

                  mc rm --recursive --force --older-than 14d "minio/qdrant-backups/ada/" || true
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ada-secret
                      key: MINIO_ROOT_PASSWORD
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi

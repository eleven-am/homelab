apiVersion: v1
kind: Service
metadata:
  name: ada-redis
  namespace: ada
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ada-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ada-redis
  namespace: ada
spec:
  serviceName: ada-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ada-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ada-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: blizzard-storage
        resources:
          requests:
            storage: 5Gi

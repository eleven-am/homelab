apiVersion: v1
kind: Service
metadata:
  name: ada-postgres
  namespace: ada
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ada-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ada-postgres
  namespace: ada
spec:
  serviceName: ada-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ada-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ada-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          imagePullPolicy: IfNotPresent
          command:
            - docker-entrypoint.sh
            - postgres
            - -c
            - max_connections=200
            - -c
            - shared_buffers=256MB
            - -c
            - password_encryption=md5
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ada-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: ada_beam_dev
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - ada_beam_dev
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - ada_beam_dev
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: blizzard-storage
        resources:
          requests:
            storage: 20Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpt-researcher-deployment
  namespace: gpt-researcher
  labels:
    app: gpt-researcher
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gpt-researcher
  template:
    metadata:
      labels:
        app: gpt-researcher
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /data/outputs /data/data && chmod -R 777 /data']
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: gpt-researcher
          image: elevenam/gpt-researcher:v3.4.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: gpt-researcher-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gpt-researcher-secret
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /usr/src/app/outputs
              subPath: outputs
            - name: data
              mountPath: /usr/src/app/data
              subPath: data
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gpt-researcher-data

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir-deployment
  namespace: mimir
  labels:
    app: mimir
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: zot.maix.ovh/mimir:v0.0.7
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: mimir-config
          env:
            - name: MIMIR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mimir-secret
                  key: MIMIR_API_KEY
            - name: MIMIR_STT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mimir-secret
                  key: LITELLM_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
      imagePullSecrets:
        - name: zot-pull-secret

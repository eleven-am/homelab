apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-deployment
  namespace: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      annotations:
        homelab.maix.ovh/config-revision: "2026-04-20-osiris-gemma-26b-a4b-v1"
      labels:
        app: litellm
    spec:
      initContainers:
        - name: init-db
          image: postgres:17
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER; do
                echo "Waiting for postgres..."
                sleep 2
              done

              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -tc "SELECT 1 FROM pg_database WHERE datname = 'litellm'" | grep -q 1 || \
              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -c "CREATE DATABASE litellm"

              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -tc "SELECT 1 FROM pg_roles WHERE rolname = '$LITELLM_DB_USER'" | grep -q 1 || \
              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -c "CREATE USER $LITELLM_DB_USER WITH PASSWORD '$LITELLM_DB_PASSWORD'"

              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -c "GRANT ALL PRIVILEGES ON DATABASE litellm TO $LITELLM_DB_USER"
              PGPASSWORD=$PG_ADMIN_PASSWORD psql -h postgres-service.postgres.svc.cluster.local -U $PG_ADMIN_USER -d litellm -c "GRANT ALL ON SCHEMA public TO $LITELLM_DB_USER"
          env:
            - name: PG_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PG_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: LITELLM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_DB_USER
            - name: LITELLM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_DB_PASSWORD
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-database:v1.83.3-stable
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /app/config.yaml
            - --port
            - "4000"
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: LITELLM_SALT_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: OPENAI_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: GEMINI_API_KEY
            - name: OSIRIS_GEMMA_API_KEY
              value: "unused"
            - name: VOX_API_KEY
              value: "unused"
            - name: STORE_MODEL_IN_DB
              value: "True"
            - name: HTTP_PROXY
              value: http://127.0.0.1:1055
            - name: HTTPS_PROXY
              value: http://127.0.0.1:1055
            - name: http_proxy
              value: http://127.0.0.1:1055
            - name: https_proxy
              value: http://127.0.0.1:1055
            - name: NO_PROXY
              value: 127.0.0.1,localhost,.svc,.svc.cluster.local,.cluster.local,postgres-service.postgres.svc.cluster.local,.anthropic.com,.openai.com,.googleapis.com,.google.com
            - name: no_proxy
              value: 127.0.0.1,localhost,.svc,.svc.cluster.local,.cluster.local,postgres-service.postgres.svc.cluster.local,.anthropic.com,.openai.com,.googleapis.com,.google.com
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 120
            periodSeconds: 10
        - name: litellm-tailscale
          image: tailscale/tailscale:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TS_KUBE_SECRET
              value: ""
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: litellm-tailscale-secret
                  key: TS_AUTHKEY
            - name: TS_EXTRA_ARGS
              value: --login-server=https://headscale.maix.ovh
            - name: TS_HOSTNAME
              value: litellm
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_USERSPACE
              value: "true"
            - name: TS_OUTBOUND_HTTP_PROXY_LISTEN
              value: :1055
            - name: TS_NO_LOGS_NO_SUPPORT
              value: "true"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: tailscale-state
              mountPath: /var/lib/tailscale
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: tailscale-state
          persistentVolumeClaim:
            claimName: litellm-tailscale-state

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: osiris/foundation-120
    litellm_params:
      model: openai/gemma-4-26b-a4b
      api_base: http://100.64.0.19:8000/v1
      api_key: os.environ/OSIRIS_GEMMA_API_KEY
      timeout: 900
      stream_timeout: 900
      max_retries: 0
      max_parallel_requests: 38
      rpm: 30
      tpm: 120000

  - model_name: osiris/embedding-1024
    litellm_params:
      model: ollama/bge-m3
      api_base: http://100.64.0.19:11434

  - model_name: osiris/reasoning-4
    litellm_params:
      model: ollama_chat/phi4-mini-reasoning
      api_base: http://ollama-service.ollama.svc.cluster.local:11434
      timeout: 900
      stream_timeout: 900
      max_retries: 0
      max_parallel_requests: 1
      rpm: 20
      tpm: 60000

  - model_name: osiris/reasoning-20
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: http://ollama-service.ollama.svc.cluster.local:11434
      timeout: 900
      stream_timeout: 900
      max_retries: 0
      max_parallel_requests: 1
      rpm: 20
      tpm: 60000

  - model_name: osiris/speech-tts
    litellm_params:
      model: openai/kokoro-tts-onnx:v1.0
      api_base: http://vox-service.vox.svc.cluster.local:11435/v1
      api_key: os.environ/VOX_API_KEY

  - model_name: osiris/speech-stt
    litellm_params:
      model: openai/parakeet-stt-onnx:tdt-0.6b-v3
      api_base: http://vox-service.vox.svc.cluster.local:11435/v1
      api_key: os.environ/VOX_API_KEY

  - model_name: "*"
    litellm_params:
      model: "*"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 900
  allowed_fails: 1
  cooldown_time: 30

litellm_settings:
  drop_params: true
  request_timeout: 900

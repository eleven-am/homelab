general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  pass_through_endpoints:
    - path: "/coding/search"
      target: "https://api.minimax.io/v1/coding_plan/search"
      headers:
        Authorization: "Bearer os.environ/MINIMAX_API_KEY"
        Content-Type: "application/json"
    - path: "/coding/vlm"
      target: "https://api.minimax.io/v1/coding_plan/vlm"
      headers:
        Authorization: "Bearer os.environ/MINIMAX_API_KEY"
        Content-Type: "application/json"
    - path: "/mimir/extract"
      target: "http://mimir-service.mimir.svc.cluster.local:3000/v1/extract"
      headers:
        Authorization: "Bearer os.environ/MIMIR_API_KEY"

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 900
  allowed_fails: 1
  cooldown_time: 30

litellm_settings:
  drop_params: true
  request_timeout: 900

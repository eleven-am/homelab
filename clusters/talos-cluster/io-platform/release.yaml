apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: io-platform
  namespace: io-platform
spec:
  chart:
    spec:
      chart: io-platform
      version: "0.3.78"
      sourceRef:
        kind: HelmRepository
        name: io-platform
        namespace: io-platform
  interval: 15m
  timeout: 10m
  releaseName: io-platform
  targetNamespace: io-platform
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: io-platform-secret
      valuesKey: SECRET_KEY_BASE
      targetPath: global.secretKeyBase
    - kind: Secret
      name: io-platform-secret
      valuesKey: CLOAK_KEY
      targetPath: io.env.IO_RUNTIME_ENCRYPTION_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: IO_RUNTIME_AUTH_PEPPER_V1
      targetPath: io.env.IO_RUNTIME_AUTH_PEPPER_V1
    - kind: Secret
      name: io-platform-secret
      valuesKey: AUTH_JWT_SECRET
      targetPath: io.env.AUTH_JWT_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: VOICE_SESSION_SECRET
      targetPath: io.env.VOICE_SESSION_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: SMTP_RELAY
      targetPath: io.env.SMTP_RELAY
    - kind: Secret
      name: io-platform-secret
      valuesKey: SMTP_USERNAME
      targetPath: io.env.SMTP_USERNAME
    - kind: Secret
      name: io-platform-secret
      valuesKey: SMTP_PASSWORD
      targetPath: io.env.SMTP_PASSWORD
    - kind: Secret
      name: io-platform-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: postgres.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: NEO4J_PASSWORD
      targetPath: neo4j.neo4j.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_USER
      targetPath: minio.rootUser
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_PASSWORD
      targetPath: minio.rootPassword
    - kind: Secret
      name: io-platform-secret
      valuesKey: INTERNAL_GRPC_TOKEN
      targetPath: global.internalGrpcAuthToken
    - kind: Secret
      name: io-platform-secret
      valuesKey: ADA_GRPC_APP_KEY
      targetPath: global.ada.appKey
    - kind: Secret
      name: io-platform-secret
      valuesKey: ADA_OSS_MASTER_KEY
      targetPath: global.ada.masterKey
    - kind: Secret
      name: io-platform-secret
      valuesKey: LITELLM_API_KEY
      targetPath: ada.llm.apiKey
  values:
    global:
      registry: zot.maix.ovh
      imagePullSecrets:
        - name: zot-pull-secret

    io:
      enabled: true
      host: io.maix.ovh
      image:
        repository: io
        tag: v0.0.90
        digest: sha256:db3421db62fc2b91aaa8c0edddfb94c3f2f42656f8f0adb81bf8d0486f0fab06
      env:
        AUTH_JWT_ISSUER: io
        AUTH_JWT_AUDIENCE: io
        CORS_ALLOWED_ORIGINS: "https://io.maix.ovh"
        MAIL_FROM: "IO <no-reply@io.maix.ovh>"
        PASSWORD_RESET_URL: "https://io.maix.ovh/auth/reset-password"
        EMAIL_VERIFICATION_URL: "https://io.maix.ovh/auth/verify-email"

    voice:
      vox:
        grpcAddr: vox-service.vox.svc.cluster.local:9090
        grpcTls: false
        outputAudioFormat: f32le
      iceTransportPolicy: all
      stunUrls:
        - stun:stun.l.google.com:19302
      turn:
        enabled: true
        urls:
          - turn:turn.horus:3478?transport=udp
          - turn:turn.horus:3478?transport=tcp
          - turns:turn.horus:5349?transport=tcp
        usernamePrefix: io
        ttlSeconds: 3600
        existingSecret:
          name: io-platform-secret
          key: TURN_SECRET

    ioWeb:
      enabled: true
      image:
        repository: io-web
        tag: v0.0.26
        digest: sha256:ec6397def50a0ca2186eac83cc492a4a7a1f61f55a7e326fb1554e5e2a7369f4
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io.maix.ovh

    ioDocs:
      enabled: true
      image:
        repository: io-docs
        tag: v0.0.8
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io-docs.maix.ovh

    sprite:
      enabled: true
      image:
        repository: zot.maix.ovh/sprite
        tag: v0.1.26
        digest: sha256:dc2545f394a8c1f9f9226702fa008785f6e1e49d682348a7a4d9e5d855b36bb7
      env:
        RUST_LOG: info

    ada:
      enabled: true
      image:
        repository: ghcr.io/eleven-am/adaoss
        tag: v0.1.104
      http:
        enabled: true
        port: 4000
      ingress:
        enabled: true
        gatewayRef:
          name: envoy-gateway
          namespace: gateway
        hosts:
          - host: ada.horus.maix.ovh
      llm:
        baseUrl: &litellm_url "http://litellm-service.litellm.svc.cluster.local:4000/v1"
        model: "osiris/foundation-120"
        embeddingModel: "osiris/embedding-1024"
        timeoutMs: 120000
        embeddingTimeoutMs: 120000
      env:
        ADA_OSS_NEO4J_USER: neo4j
        ADA_OSS_NEO4J_DATABASE: neo4j

    postgres:
      enabled: true
      storage:
        size: 20Gi
        storageClass: blizzard-storage
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 2Gi

    redis:
      enabled: true
      storage:
        size: 5Gi
        storageClass: blizzard-storage

    neo4j:
      enabled: true
      nameOverride: neo4j
      neo4j:
        name: neo4j
        resources:
          cpu: "500m"
          memory: "2Gi"
        plugins:
          - apoc
          - graph-data-science
      config:
        dbms.security.procedures.unrestricted: "gds.*,apoc.*"
        dbms.security.procedures.allowlist: "gds.*,apoc.*"
        server.memory.pagecache.size: "512M"
        server.memory.heap.initial_size: "512M"
        server.memory.heap.max_size: "1G"
      volumes:
        data:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 20Gi
        logs:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 5Gi

    qdrant:
      enabled: true
      persistence:
        size: 20Gi
        storageClassName: blizzard-storage

    minio:
      enabled: true
      buckets:
        - ada-oss-payloads
        - io-bundles
      storage:
        size: 20Gi
        storageClass: app-storage

    backup:
      enabled: false

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: io-platform
  namespace: io-platform
spec:
  chart:
    spec:
      chart: io-platform
      sourceRef:
        kind: OCIRepository
        name: io-platform
        namespace: flux-system
  interval: 15m
  timeout: 10m
  releaseName: io-platform
  targetNamespace: io-platform
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: io-platform-secret
      valuesKey: SECRET_KEY_BASE
      targetPath: io.env.SECRET_KEY_BASE
    - kind: Secret
      name: io-platform-secret
      valuesKey: CLOAK_KEY
      targetPath: io.env.CLOAK_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: AUTH_JWT_SECRET
      targetPath: io.env.AUTH_JWT_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: VOICE_SESSION_SECRET
      targetPath: io.env.VOICE_SESSION_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: postgres.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: NEO4J_PASSWORD
      targetPath: neo4j.neo4j.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_USER
      targetPath: minio.rootUser
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_PASSWORD
      targetPath: minio.rootPassword
    - kind: Secret
      name: io-platform-secret
      valuesKey: OPENAI_API_KEY
      targetPath: ada.env.OPENAI_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: OPENROUTER_API_KEY
      targetPath: ada.env.OPENROUTER_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: GOOGLE_API_KEY
      targetPath: ada.env.GOOGLE_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: ANTHROPIC_API_KEY
      targetPath: ada.env.ANTHROPIC_API_KEY
  values:
    global:
      registry: zot.maix.ovh
      imagePullSecrets:
        - name: zot-pull-secret

    io:
      enabled: true
      image:
        repository: io
        tag: v0.0.34
      env:
        PHX_HOST: io.maix.ovh
        AUTH_JWT_ISSUER: io-go
        AUTH_JWT_AUDIENCE: io
        SPRITE_GATEWAY_ADAPTER: grpc
        SPRITE_EVENT_SUBSCRIBER_ENABLED: "true"
        ADA_PUBLIC_EVENT_SUBSCRIBER_ENABLED: "true"
        ADA_GRPC_TIMEOUT_MS: "30000"
        CLI_AUTH_FRONTEND_URL: "https://io.maix.ovh/cli/authorize"
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io.maix.ovh

    sprite:
      enabled: true
      image:
        repository: sprite
        tag: v0.0.28
      env:
        RUST_LOG: info
        SPRITE_ADA_PRICING_TIER: core
        SPRITE_ADA_AVAILABLE_TOKENS: "1000000"

    ada:
      enabled: true
      image:
        repository: ada
        tag: v0.1.22
      env:
        MIX_ENV: prod
        ADA_BEAM_NEO4J_ENABLED: "true"
        ADA_BEAM_NEO4J_USER: neo4j
        ADA_BEAM_NEO4J_DATABASE: neo4j
        ADA_BEAM_QDRANT_ENABLED: "true"
        ADA_BEAM_START_REDIS: "false"
        ADA_BEAM_REDIS_ENABLED: "false"
        ADA_BEAM_MINIO_ENABLED: "true"
        ADA_BEAM_MINIO_BUCKET: ada-beam-payloads
        EMBEDDING_PROVIDER: ollama
        EMBEDDING_MODEL: "bge-m3:latest"
        EMBEDDING_BASE_URL: "http://ollama-service.ollama.svc.cluster.local:11434"
        EMBEDDING_DIMENSION: "1024"
        LLM_PROVIDER: openrouter
        LLM_MODEL: "anthropic/claude-sonnet-4.5"
        LLM_EXTRACTION_PROVIDER: openrouter
        LLM_EXTRACTION_MODEL: "anthropic/claude-sonnet-4.5"
        LLM_EXTRACTION_BASE_URL: "https://openrouter.ai/api/v1"
        LLM_SUMMARIZATION_PROVIDER: google
        LLM_SUMMARIZATION_MODEL: "gemini-2.5-pro"
        LLM_CROSS_ENCODER_PROVIDER: openai
        LLM_CROSS_ENCODER_MODEL: "gpt-5.2"

    postgres:
      enabled: true
      storage:
        size: 20Gi
        storageClass: app-storage

    redis:
      enabled: true
      storage:
        size: 5Gi
        storageClass: app-storage

    neo4j:
      enabled: true
      neo4j:
        name: neo4j-standalone
        resources:
          cpu: "500m"
          memory: "2Gi"
        plugins:
          - apoc
          - graph-data-science
      config:
        dbms.security.procedures.unrestricted: "gds.*,apoc.*"
        dbms.security.procedures.allowlist: "gds.*,apoc.*"
        server.memory.pagecache.size: "512M"
        server.memory.heap.initial_size: "512M"
        server.memory.heap.max_size: "1G"
      volumes:
        data:
          mode: dynamic
          dynamic:
            storageClassName: app-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 20Gi
        logs:
          mode: dynamic
          dynamic:
            storageClassName: app-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 5Gi

    qdrant:
      enabled: true
      persistence:
        size: 20Gi
        storageClassName: app-storage

    minio:
      enabled: true
      buckets:
        - ada-beam-payloads
        - io-bundles
      storage:
        size: 20Gi
        storageClass: app-storage

    backup:
      enabled: false

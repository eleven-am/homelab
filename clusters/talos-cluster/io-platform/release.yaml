apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: io-platform
  namespace: io-platform
spec:
  chart:
    spec:
      chart: io-platform
      version: ">=0.2.0"
      sourceRef:
        kind: HelmRepository
        name: io-platform
        namespace: io-platform
  interval: 15m
  timeout: 10m
  releaseName: io-platform
  targetNamespace: io-platform
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: io-platform-secret
      valuesKey: SECRET_KEY_BASE
      targetPath: global.secretKeyBase
    - kind: Secret
      name: io-platform-secret
      valuesKey: CLOAK_KEY
      targetPath: io.env.CLOAK_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: AUTH_JWT_SECRET
      targetPath: io.env.AUTH_JWT_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: VOICE_SESSION_SECRET
      targetPath: io.env.VOICE_SESSION_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: POLAR_ACCESS_TOKEN
      targetPath: io.env.POLAR_ACCESS_TOKEN
    - kind: Secret
      name: io-platform-secret
      valuesKey: POLAR_WEBHOOK_SECRET
      targetPath: io.env.POLAR_WEBHOOK_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: postgres.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: NEO4J_PASSWORD
      targetPath: neo4j.neo4j.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_USER
      targetPath: minio.rootUser
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_PASSWORD
      targetPath: minio.rootPassword
    - kind: Secret
      name: io-platform-secret
      valuesKey: INTERNAL_GRPC_TOKEN
      targetPath: global.internalGrpcAuthToken
    - kind: Secret
      name: io-platform-secret
      valuesKey: ADA_BEAM_GRPC_AUTH_TOKEN
      targetPath: global.adaBeamGrpcAuthToken
    - kind: Secret
      name: io-platform-secret
      valuesKey: OPENAI_API_KEY
      targetPath: ada.env.OPENAI_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: OPENROUTER_API_KEY
      targetPath: ada.env.OPENROUTER_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: OPENROUTER_API_KEY
      targetPath: ada.env.ADA_BEAM_LLM_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: GOOGLE_API_KEY
      targetPath: ada.env.GOOGLE_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: ANTHROPIC_API_KEY
      targetPath: ada.env.ANTHROPIC_API_KEY
  values:
    global:
      registry: zot.maix.ovh
      imagePullSecrets:
        - name: zot-pull-secret

    io:
      enabled: true
      host: io.maix.ovh
      image:
        repository: io
        tag: v0.0.41
      env:
        AUTH_JWT_ISSUER: io
        AUTH_JWT_AUDIENCE: io
        POLAR_SANDBOX: "true"
        CORS_ALLOWED_ORIGINS: "https://io.maix.ovh"
    ioWeb:
      enabled: true
      image:
        repository: io-web
        tag: v0.0.4
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io.maix.ovh

    sprite:
      enabled: true
      image:
        repository: sprite
        tag: v0.1.7
      env:
        RUST_LOG: info

    ada:
      enabled: true
      image:
        repository: ada
        tag: v0.1.27
      env:
        ADA_BEAM_NEO4J_USER: neo4j
        ADA_BEAM_NEO4J_DATABASE: neo4j
        ADA_BEAM_OLLAMA_URL: "http://ollama-service.ollama.svc.cluster.local:11434"
        ADA_BEAM_OLLAMA_EMBED_MODEL: "bge-m3:latest"
        ADA_BEAM_LLM_EMBED_PROVIDER: ollama
        ADA_BEAM_LLM_EMBED_MODEL: "bge-m3:latest"
        ADA_BEAM_LLM_EMBED_API_KEY: ollama
        ADA_BEAM_LLM_EMBED_URL: "http://ollama-service.ollama.svc.cluster.local:11434/v1"
        ADA_BEAM_LLM_PROVIDER: openrouter
        ADA_BEAM_LLM_MODEL: "anthropic/claude-sonnet-4.5"
        ADA_BEAM_LLM_URL: "https://openrouter.ai/api/v1"

    postgres:
      enabled: true
      storage:
        size: 20Gi
        storageClass: blizzard-storage

    redis:
      enabled: true
      storage:
        size: 5Gi
        storageClass: blizzard-storage

    neo4j:
      enabled: true
      nameOverride: neo4j
      neo4j:
        name: neo4j
        resources:
          cpu: "500m"
          memory: "2Gi"
        plugins:
          - apoc
          - graph-data-science
      config:
        dbms.security.procedures.unrestricted: "gds.*,apoc.*"
        dbms.security.procedures.allowlist: "gds.*,apoc.*"
        server.memory.pagecache.size: "512M"
        server.memory.heap.initial_size: "512M"
        server.memory.heap.max_size: "1G"
      volumes:
        data:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 20Gi
        logs:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 5Gi

    qdrant:
      enabled: true
      persistence:
        size: 20Gi
        storageClassName: blizzard-storage

    minio:
      enabled: true
      buckets:
        - ada-beam-payloads
        - io-bundles
      storage:
        size: 20Gi
        storageClass: app-storage

    backup:
      enabled: false

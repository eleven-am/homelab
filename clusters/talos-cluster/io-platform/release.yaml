apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: io-platform
  namespace: io-platform
spec:
  chart:
    spec:
      chart: io-platform
      version: "0.3.35"
      sourceRef:
        kind: HelmRepository
        name: io-platform
        namespace: io-platform
  interval: 15m
  timeout: 10m
  releaseName: io-platform
  targetNamespace: io-platform
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: Secret
      name: io-platform-secret
      valuesKey: SECRET_KEY_BASE
      targetPath: global.secretKeyBase
    - kind: Secret
      name: io-platform-secret
      valuesKey: CLOAK_KEY
      targetPath: io.env.CLOAK_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: AUTH_JWT_SECRET
      targetPath: io.env.AUTH_JWT_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: VOICE_SESSION_SECRET
      targetPath: io.env.VOICE_SESSION_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: POLAR_ACCESS_TOKEN
      targetPath: io.env.POLAR_ACCESS_TOKEN
    - kind: Secret
      name: io-platform-secret
      valuesKey: POLAR_WEBHOOK_SECRET
      targetPath: io.env.POLAR_WEBHOOK_SECRET
    - kind: Secret
      name: io-platform-secret
      valuesKey: POSTGRES_PASSWORD
      targetPath: postgres.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: NEO4J_PASSWORD
      targetPath: neo4j.neo4j.password
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_USER
      targetPath: minio.rootUser
    - kind: Secret
      name: io-platform-secret
      valuesKey: MINIO_ROOT_PASSWORD
      targetPath: minio.rootPassword
    - kind: Secret
      name: io-platform-secret
      valuesKey: INTERNAL_GRPC_TOKEN
      targetPath: global.internalGrpcAuthToken
    - kind: Secret
      name: io-platform-secret
      valuesKey: ADA_BEAM_GRPC_AUTH_TOKEN
      targetPath: global.adaBeamGrpcAuthToken
    - kind: Secret
      name: io-platform-secret
      valuesKey: LITELLM_API_KEY
      targetPath: ada.env.ADA_BEAM_LLM_API_KEY
    - kind: Secret
      name: io-platform-secret
      valuesKey: LITELLM_API_KEY
      targetPath: ada.env.ADA_BEAM_LLM_EMBED_API_KEY
  values:
    global:
      registry: zot.maix.ovh
      imagePullSecrets:
        - name: zot-pull-secret

    io:
      enabled: true
      host: io.maix.ovh
      image:
        repository: io
        tag: v0.0.61
      env:
        AUTH_JWT_ISSUER: io
        AUTH_JWT_AUDIENCE: io
        POLAR_SANDBOX: "true"
        CORS_ALLOWED_ORIGINS: "https://io.maix.ovh"
    ioWeb:
      enabled: true
      image:
        repository: io-web
        tag: v0.0.12
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io.maix.ovh

    ioDocs:
      enabled: true
      image:
        repository: io-docs
        tag: v0.0.3
      ingress:
        enabled: true
        gatewayRef:
          name: cloudflare-gateway
          namespace: cloudflare-gateway
        hosts:
          - host: io-docs.maix.ovh

    sprite:
      enabled: true
      image:
        repository: sprite
        tag: v0.1.12
      env:
        RUST_LOG: info

    ada:
      enabled: true
      image:
        repository: ada
        tag: v0.1.36
      llm:
        apiKey: ""
        embedApiKey: ""
        timeoutMs: 120000
        embedTimeoutMs: 120000
      env:
        ADA_BEAM_NEO4J_USER: neo4j
        ADA_BEAM_NEO4J_DATABASE: neo4j
        ADA_BEAM_LLM_PROVIDER: openai
        ADA_BEAM_LLM_MODEL: "osiris/gemma-4-26b-a4b"
        ADA_BEAM_LLM_EMBED_PROVIDER: openai
        ADA_BEAM_LLM_EMBED_MODEL: "osiris/bge-m3"
        ADA_BEAM_LLM_URL: &litellm_url "http://litellm-service.litellm.svc.cluster.local:4000/v1"
        ADA_BEAM_LLM_EMBED_URL: *litellm_url

    postgres:
      enabled: true
      storage:
        size: 20Gi
        storageClass: blizzard-storage
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 2Gi

    redis:
      enabled: true
      storage:
        size: 5Gi
        storageClass: blizzard-storage

    neo4j:
      enabled: true
      nameOverride: neo4j
      neo4j:
        name: neo4j
        resources:
          cpu: "500m"
          memory: "2Gi"
        plugins:
          - apoc
          - graph-data-science
      config:
        dbms.security.procedures.unrestricted: "gds.*,apoc.*"
        dbms.security.procedures.allowlist: "gds.*,apoc.*"
        server.memory.pagecache.size: "512M"
        server.memory.heap.initial_size: "512M"
        server.memory.heap.max_size: "1G"
      volumes:
        data:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 20Gi
        logs:
          mode: dynamic
          dynamic:
            storageClassName: blizzard-storage
            accessModes:
              - ReadWriteOnce
            requests:
              storage: 5Gi

    qdrant:
      enabled: true
      persistence:
        size: 20Gi
        storageClassName: blizzard-storage

    minio:
      enabled: true
      buckets:
        - ada-beam-payloads
        - io-bundles
      storage:
        size: 20Gi
        storageClass: app-storage

    backup:
      enabled: false

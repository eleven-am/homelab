apiVersion: apps/v1
kind: Deployment
metadata:
  name: lk-jwt-service
  namespace: livekit
  labels:
    app: lk-jwt-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lk-jwt-service
  template:
    metadata:
      labels:
        app: lk-jwt-service
    spec:
      containers:
        - name: lk-jwt-service
          image: ghcr.io/element-hq/lk-jwt-service:v0.4.4
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LIVEKIT_URL
              value: "wss://livekit.maix.ovh"
            - name: LIVEKIT_KEY
              valueFrom:
                secretKeyRef:
                  name: livekit-credentials
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_SECRET
              valueFrom:
                secretKeyRef:
                  name: livekit-credentials
                  key: LIVEKIT_API_SECRET
            - name: LIVEKIT_FULL_ACCESS_HOMESERVERS
              value: "matrix.maix.ovh"
            - name: LIVEKIT_JWT_BIND
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lk-jwt-service
  namespace: livekit
spec:
  selector:
    app: lk-jwt-service
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: lk-jwt-route
  namespace: livekit
spec:
  parentRefs:
    - name: cloudflare-gateway
      namespace: cloudflare-gateway
  hostnames:
    - "lk-jwt.maix.ovh"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: lk-jwt-service
          port: 8080

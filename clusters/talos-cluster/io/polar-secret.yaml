apiVersion: v1
kind: Secret
metadata:
    name: polar-secret
    namespace: io
    annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ada,flow
type: Opaque
stringData:
    POLAR_ACCESS_TOKEN: REPLACE_WITH_YOUR_POLAR_ACCESS_TOKEN
    BILLING_STARTER_PRODUCT_ID: REPLACE_WITH_POLAR_STARTER_PRODUCT_ID
    BILLING_PRO_PRODUCT_ID: REPLACE_WITH_POLAR_PRO_PRODUCT_ID
    BILLING_WEBHOOK_SECRET: REPLACE_WITH_POLAR_WEBHOOK_SECRET
    BILLING_SUCCESS_URL: REPLACE_WITH_YOUR_SUCCESS_URL

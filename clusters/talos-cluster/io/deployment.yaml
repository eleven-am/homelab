apiVersion: apps/v1
kind: Deployment
metadata:
  name: io
  namespace: io
spec:
  replicas: 1
  selector:
    matchLabels:
      app: io
  template:
    metadata:
      labels:
        app: io
    spec:
      imagePullSecrets:
        - name: zot-pull-secret
      initContainers:
        - name: init-db
          image: postgres:16-alpine
          env:
            - name: PGHOST
              value: "postgres-service.postgres.svc.cluster.local"
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: IO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_USER
            - name: IO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_PASSWORD
            - name: IO_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_NAME
          command:
            - sh
            - -c
            - |
              echo "Checking if user $IO_DB_USER exists..."
              USER_EXISTS=$(psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='$IO_DB_USER'")
              if [ "$USER_EXISTS" != "1" ]; then
                echo "Creating user $IO_DB_USER..."
                psql -c "CREATE USER $IO_DB_USER WITH PASSWORD '$IO_DB_PASSWORD' CREATEDB;"
              else
                echo "User $IO_DB_USER already exists, updating password..."
                psql -c "ALTER USER $IO_DB_USER WITH PASSWORD '$IO_DB_PASSWORD' CREATEDB;"
              fi

              echo "Checking if database $IO_DB_NAME exists..."
              DB_EXISTS=$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='$IO_DB_NAME'")
              if [ "$DB_EXISTS" != "1" ]; then
                echo "Creating database $IO_DB_NAME..."
                psql -c "CREATE DATABASE $IO_DB_NAME OWNER $IO_DB_USER;"
              else
                echo "Database $IO_DB_NAME already exists"
              fi

              echo "Granting privileges..."
              psql -c "GRANT ALL PRIVILEGES ON DATABASE $IO_DB_NAME TO $IO_DB_USER;"
              echo "Database initialization complete!"
      containers:
        - name: io
          image: zot.maix.ovh/io:v0.0.6
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: IO_HTTP_ADDR
              value: ":3000"
            - name: IO_DB_HOST
              value: "postgres-service.postgres.svc.cluster.local"
            - name: IO_DB_PORT
              value: "5432"
            - name: IO_DB_SSL_MODE
              value: "disable"
            - name: IO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_USER
            - name: IO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_PASSWORD
            - name: IO_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: DB_NAME
            - name: IO_REDIS_ADDR
              value: "redis-service.redis.svc.cluster.local:6379"
            - name: IO_FLOW_GRPC_ADDR
              value: "flow-service.flow.svc.cluster.local:9090"
            - name: IO_ADA_GRPC_ADDR
              value: "ada-service.ada.svc.cluster.local:9090"
            - name: IO_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: JWT_SECRET
            - name: IO_REALTIME_SESSION_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: io-secret
                  key: SESSION_TOKEN_SECRET
            - name: IO_STT_GRPC_ADDR
              value: "voice-gateway.voice.svc.cluster.local:50051"
            - name: IO_TTS_GRPC_ADDR
              value: "voice-gateway.voice.svc.cluster.local:50051"
            - name: IO_SEED_DEV_RBAC
              value: "false"
            - name: IO_ENABLE_DEV_AUTH_HEADER
              value: "false"
            - name: IO_POLAR_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: POLAR_ACCESS_TOKEN
            - name: IO_BILLING_STARTER_PRODUCT_ID
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: BILLING_STARTER_PRODUCT_ID
            - name: IO_BILLING_PRO_PRODUCT_ID
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: BILLING_PRO_PRODUCT_ID
            - name: IO_BILLING_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: BILLING_WEBHOOK_SECRET
            - name: IO_BILLING_SUCCESS_URL
              valueFrom:
                secretKeyRef:
                  name: polar-secret
                  key: BILLING_SUCCESS_URL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

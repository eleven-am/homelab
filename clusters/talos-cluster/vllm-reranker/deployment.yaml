apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-reranker
  namespace: vllm-reranker
  labels:
    app: vllm-reranker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-reranker
  template:
    metadata:
      labels:
        app: vllm-reranker
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vllm-reranker
          image: vllm/vllm-openai:v0.25.1
          imagePullPolicy: IfNotPresent
          command:
            - vllm
            - serve
          args:
            - BAAI/bge-reranker-v2-m3
            - --served-model-name
            - BAAI/bge-reranker-v2-m3
            - --host
            - 0.0.0.0
            - --port
            - "8001"
            - --max-model-len
            - "8192"
            - --gpu-memory-utilization
            - "0.15"
            - --dtype
            - bfloat16
            - --enforce-eager
          env:
            - name: HF_HOME
              value: /data/hf
            - name: HUGGING_FACE_HUB_CACHE
              value: /data/hf/hub
          ports:
            - name: http
              containerPort: 8001
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 8Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /data/hf
            - name: dshm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-reranker-cache
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: durable-streams-route
  namespace: durable-streams
spec:
  parentRefs:
    - name: cloudflare-gateway
      namespace: cloudflare-gateway
  hostnames:
    - "dstreams.horus.maix.ovh"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: durable-streams-service
          port: 4437

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reranker
  namespace: reranker
  labels:
    app: reranker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reranker
  template:
    metadata:
      labels:
        app: reranker
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.10.2
          args:
            - "--model"
            - "Qwen/Qwen3-Reranker-0.6B"
            - "--task"
            - "score"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
            - "--dtype"
            - "float16"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.30"
            - "--hf-overrides"
            - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_HOME
              value: /cache
            - name: HUGGINGFACE_HUB_CACHE
              value: /cache
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 2000m
              memory: 8Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 30
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: reranker-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

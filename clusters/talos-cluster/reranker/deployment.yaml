apiVersion: apps/v1
kind: Deployment
metadata:
  name: reranker
  namespace: reranker
  labels:
    app: reranker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reranker
  template:
    metadata:
      labels:
        app: reranker
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai-cpu:v0.20.1
          args:
            - "Qwen/Qwen3-Reranker-0.6B"
            - "--port"
            - "8000"
            - "--host"
            - "0.0.0.0"
            - "--dtype"
            - "bfloat16"
            - "--max-model-len"
            - "8192"
            - "--hf-overrides"
            - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_HOME
              value: /cache
            - name: HUGGINGFACE_HUB_CACHE
              value: /cache
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "4"
            - name: VLLM_CPU_OMP_THREADS_BIND
              value: "0-7"
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
            limits:
              cpu: "8"
              memory: 12Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: reranker-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

apiVersion: apps/v1
kind: Deployment
metadata:
  name: reranker-deployment
  namespace: reranker
  labels:
    app: reranker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: reranker
  template:
    metadata:
      labels:
        app: reranker
    spec:
      runtimeClassName: nvidia
      containers:
        - name: reranker
          image: docker.io/elevenam/vllm-reranker-cu128:v0.14.1
          imagePullPolicy: IfNotPresent
          command:
            - vllm
            - serve
            - BAAI/bge-reranker-v2-m3
          args:
            - --served-model-name
            - BAAI/bge-reranker-v2-m3
            - --host
            - 0.0.0.0
            - --port
            - "8001"
            - --gpu-memory-utilization
            - "0.12"
            - --max-model-len
            - "8192"
            - --dtype
            - bfloat16
            - --enforce-eager
          env:
            - name: HF_HOME
              value: /data/hf
            - name: HUGGING_FACE_HUB_CACHE
              value: /data/hf/hub
            - name: VLLM_ENABLE_CUDA_COMPATIBILITY
              value: "1"
            - name: VLLM_ATTENTION_BACKEND
              value: TRITON_ATTN
          ports:
            - containerPort: 8001
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: 16Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: reranker-cache
              mountPath: /data/hf
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: reranker-cache
          persistentVolumeClaim:
            claimName: reranker-cache

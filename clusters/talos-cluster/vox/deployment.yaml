apiVersion: apps/v1
kind: Deployment
metadata:
  name: vox-deployment
  namespace: vox
  labels:
    app: vox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vox
  template:
    metadata:
      labels:
        app: vox
      annotations:
        homelab.maix.ovh/voxtral-adapter: "0.2.31"
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vox
          image: docker.io/elevenam/vox:v0.2.19
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              rm -rf /home/vox/.vox/adapters/vox-voxtral
              install -d -o vox -g vox /home/vox/.vox/adapters/vox-voxtral
              gosu vox /bin/uv pip install \
                --python /home/vox/app/.venv/bin/python \
                --target /home/vox/.vox/adapters/vox-voxtral \
                --no-deps \
                /opt/vox-wheels/vox_voxtral-0.2.31-py3-none-any.whl
              exec /usr/local/bin/vox-entrypoint.sh \
                vox serve --host 0.0.0.0 --port 11435 --ttl 0
          ports:
            - containerPort: 11435
              name: http
            - containerPort: 9090
              name: grpc
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 4000m
              memory: 12Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: vox-data
              mountPath: /home/vox/.vox
            - name: vox-adapter-wheels
              mountPath: /opt/vox-wheels
              readOnly: true
          startupProbe:
            httpGet:
              path: /v1/health
              port: 11435
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 11435
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 11435
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: vox-data
          persistentVolumeClaim:
            claimName: vox-data
        - name: vox-adapter-wheels
          configMap:
            name: voxtral-adapter-wheel

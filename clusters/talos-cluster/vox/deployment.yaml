apiVersion: apps/v1
kind: Deployment
metadata:
  name: vox-deployment
  namespace: vox
  labels:
    app: vox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vox
  template:
    metadata:
      labels:
        app: vox
    spec:
      runtimeClassName: nvidia
      initContainers:
        - name: fix-vox-permissions
          image: alpine:3.22
          command:
            - sh
            - -lc
            - mkdir -p /home/vox/.vox/adapters && chown 10000:10000 /home/vox/.vox /home/vox/.vox/adapters
          volumeMounts:
            - name: vox-data
              mountPath: /home/vox/.vox
      containers:
        - name: vox
          image: docker.io/elevenam/vox:v0.2.38@sha256:33cb236e8d7335ba331366304f129d411bacb30361ea642438f0735c512ba854
          imagePullPolicy: IfNotPresent
          args:
            - vox
            - serve
            - --host
            - 0.0.0.0
            - --port
            - "11435"
            - --ttl
            - "0"
            - --max-loaded
            - "2"
            - --device
            - cuda
            - --preload
            - parakeet-stt-onnx:tdt-0.6b-v3
            - --preload
            - kokoro-tts-onnx:v1.0
            - --preload-vad
          env:
            - name: VOX_RTC_STUN_URLS
              value: stun:turn.maix.ovh:3478
            - name: VOX_RTC_TURN_URLS
              value: turn:turn.maix.ovh:3478?transport=udp,turn:turn.maix.ovh:3478?transport=tcp,turns:turn.maix.ovh:5349?transport=tcp
            - name: VOX_RTC_TURN_CREDENTIAL_TTL_SECONDS
              value: "3600"
            - name: VOX_RTC_TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: coturn-secret
                  key: TURN_SECRET
          ports:
            - containerPort: 11435
              name: http
            - containerPort: 9090
              name: grpc
          resources:
            requests:
              cpu: 1000m
              memory: 4Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: 4000m
              memory: 12Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: vox-data
              mountPath: /home/vox/.vox
          startupProbe:
            httpGet:
              path: /v1/health
              port: 11435
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 11435
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 11435
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: vox-data
          persistentVolumeClaim:
            claimName: vox-data

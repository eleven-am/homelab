apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-path-router
  namespace: livekit
data:
  nginx.conf: |
    events {}
    http {
      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }
      server {
        listen 80;

        location ^~ /livekit/jwt/ {
          proxy_pass http://lk-jwt-service:8080/;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location ^~ /livekit/sfu/ {
          proxy_pass http://livekit-server:7880/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 600s;
          proxy_send_timeout 600s;
        }

        location / {
          proxy_pass http://livekit-server:7880/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 600s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: livekit-path-router
  namespace: livekit
  labels:
    app: livekit-path-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: livekit-path-router
  template:
    metadata:
      labels:
        app: livekit-path-router
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: livekit-path-router
---
apiVersion: v1
kind: Service
metadata:
  name: livekit-path-router
  namespace: livekit
spec:
  selector:
    app: livekit-path-router
  ports:
    - port: 80
      targetPort: 80
      name: http
      protocol: TCP
  type: ClusterIP

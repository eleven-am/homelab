services:
  reranker-vllm:
    image: vllm-node-tf5
    container_name: reranker-vllm
    restart: unless-stopped
    network_mode: host
    ipc: host
    gpus: all
    environment:
      HF_HOME: /data/hf
      HUGGING_FACE_HUB_CACHE: /data/hf/hub
    volumes:
      - /home/royossai/reranker-cache:/data/hf
    command:
      - vllm
      - serve
      - BAAI/bge-reranker-v2-gemma
      - --served-model-name
      - BAAI/bge-reranker-v2-gemma
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.08"
      - --dtype
      - bfloat16
      - --hf-overrides
      - '{"architectures":["GemmaForSequenceClassification"],"classifier_from_token":["Yes"],"method":"no_post_processing"}'
      - --enforce-eager
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 8m

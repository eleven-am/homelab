services:
  gemma4-26b-a4b-vllm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: gemma4-26b-a4b-vllm
    restart: unless-stopped
    network_mode: host
    ipc: host
    gpus: all
    environment:
      HF_HOME: /data/hf
      HUGGING_FACE_HUB_CACHE: /data/hf/hub
    volumes:
      - /home/royossai/gemma4-26b-a4b-cache:/data/hf
    command:
      - google/gemma-4-26B-A4B-it
      - --served-model-name
      - gemma-4-26b-a4b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.72"
      - --max-num-seqs
      - "4"
      - --max-num-batched-tokens
      - "8192"
      - --max-num-partial-prefills
      - "1"
      - --max-long-partial-prefills
      - "1"
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --uvicorn-log-level
      - warning
      - --disable-log-stats
      - --enforce-eager
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5m

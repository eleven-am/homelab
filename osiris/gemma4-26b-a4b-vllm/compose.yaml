services:
  gemma4-26b-a4b-vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: gemma4-26b-a4b-vllm
    restart: unless-stopped
    network_mode: host
    ipc: host
    gpus: all
    environment:
      HF_HOME: /data/hf
      HUGGING_FACE_HUB_CACHE: /data/hf/hub
    volumes:
      - /home/royossai/gemma4-31b-nvfp4-cache:/data/hf
    command:
      - nvidia/Gemma-4-31B-IT-NVFP4
      - --served-model-name
      - gemma-4-26b-a4b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.80"
      - --enforce-eager
      - --quantization
      - modelopt
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15m

services:
  mistral-small-4-vllm:
    image: elevenam/spark-vllm-ms4@sha256:10bb80b770f6053099f968e921c0b472c3961aeb8fd9830681525ff253c617cc
    container_name: mistral-small-4-vllm
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: 16g
    gpus: all
    environment:
      HF_HOME: /data/hf
      HUGGING_FACE_HUB_CACHE: /data/hf/hub
      VLLM_MLA_DISABLE: "1"
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_USE_FLASHINFER_MOE_FP4: "0"
      VLLM_TEST_FORCE_FP8_MARLIN: "1"
    volumes:
      - /home/royossai/mistral-small-4-cache:/data/hf
      - /home/royossai/.cache/huggingface/token:/data/hf/token:ro
    command:
      - vllm
      - serve
      - mistralai/Mistral-Small-4-119B-2603-NVFP4
      - --served-model-name
      - mistral-small-4-119b-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tokenizer-mode
      - mistral
      - --config-format
      - mistral
      - --load-format
      - mistral
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.75"
      - --tool-call-parser
      - mistral
      - --enable-auto-tool-choice
      - --reasoning-parser
      - mistral
      - --max-num-batched-tokens
      - "8192"
      - --max-num-seqs
      - "8"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20m
    stop_grace_period: 2m

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: proxmox-node
    static_configs:
      - targets: ["192.168.1.6:9100"]
        labels:
          host: proxmox

  - job_name: proxmox-vms
    static_configs:
      - targets: ["192.168.1.6:9221"]
    metrics_path: /pve
    params:
      module: [default]
      target: [localhost]

  - job_name: tunserver
    static_configs:
      - targets: ["tunserver:9100"]
        labels:
          host: tunserver

  - job_name: talos-gpu
    scheme: https
    static_configs:
      - targets: ["dcgm.horus.maix.ovh"]
        labels:
          host: talos
